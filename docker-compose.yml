version: '3.8'

services:
  agent-service:
    build:
      context: ./apps/agent-service
      dockerfile: Dockerfile
    container_name: holonet-agent
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - PORT=3002
      # Connect to the host machine's server/DB if needed
      # Or use internal networking if server is also dockerized
    volumes:
      - ./apps/agent-service:/app
      - /app/node_modules
    command: npm run dev

